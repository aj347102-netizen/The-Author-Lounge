{% extends 'base.html' %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🖊️</div>
    <h1 class="auth-title">Join Ink & Pages</h1>
    <p class="auth-subtitle">Connect with authors worldwide</p>
    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label>Display Name <span class="required">*</span></label>
        <input type="text" name="display_name" placeholder="Jane Austen" required>
      </div>
      <div class="form-group">
        <label>Username <span class="required">*</span></label>
        <<input type="text" name="username" placeholder="jane_austen" required>
      <div class="form-group">
        <label>Genre</label>
        <select name="genre">
          <option value="">Select your genre</option>
          <option>Fiction</option>
          <option>Non-Fiction</option>
          <option>Romance</option>
          <option>Mystery & Thriller</option>
          <option>Fantasy & Sci-Fi</option>
          <option>Historical Fiction</option>
          <option>Self-Help</option>
          <option>Young Adult</option>
          <option>Children's</option>
          <option>Poetry</option>
          <option>Biography</option>
          <option>Horror</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Bio</label>
        <textarea name="bio" placeholder="Tell fellow authors about yourself..." rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>Password <span class="required">*</span></label>
        <input type="password" name="password" placeholder="Min. 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn-primary btn-full">Create Account</button>
    </form>
    <p class="auth-switch">Already a member? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</div>
{% endblock %}
