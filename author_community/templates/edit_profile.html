{% extends 'base.html' %}
{% block title %} — Edit Profile{% endblock %}
{% block content %}
<div class="page-header">
  <a href="{{ url_for('profile', username=user['username']) }}" class="back-btn">← Back</a>
  <h2>Edit Profile</h2>
</div>

<div class="auth-card" style="margin-top:1rem;">
  <form method="POST" action="{{ url_for('edit_profile') }}" enctype="multipart/form-data">

    <div class="form-group">
      <label>Display Name</label>
      <input type="text" name="display_name" value="{{ user['display_name'] }}" required>
    </div>

    <div class="form-group">
      <label>Bio</label>
      <textarea name="bio" rows="4">{{ user['bio'] or '' }}</textarea>
    </div>

    <div class="form-group">
      <label>Genre</label>
      <select name="genre">
        <option value="">Select genre</option>
        {% for g in ['Fiction','Non-Fiction','Romance','Mystery & Thriller','Fantasy & Sci-Fi','Historical Fiction','Self-Help','Young Adult',"Children's",'Poetry','Biography','Horror','Other'] %}
        <option {% if user['genre'] == g %}selected{% endif %}>{{ g }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Profile Photo 📸</label>
      {% if user['avatar_url'] %}
      <img src="{{ user['avatar_url'] }}" id="preview" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #C9A84C;display:block;margin-bottom:12px;">
      {% else %}
      <img id="preview" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #C9A84C;display:none;margin-bottom:12px;">
      {% endif %}

      <input type="file" name="avatar_file" id="avatar_input"
             style="position:absolute;width:1px;height:1px;opacity:0.01;">
      <label for="avatar_input"
             style="display:block;width:100%;padding:16px;background:#3A2260;color:#C9A84C;border:2px solid #C9A84C;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;text-align:center;-webkit-appearance:none;">
        📷 Choose Photo
      </label>
      <small id="file-name" style="display:block;margin-top:8px;color:#9A7ABB;text-align:center;">No photo selected yet</small>
    </div>

    <div class="form-group">
      <label>Website 🌐</label>
      <input type="text" name="website" value="{{ user['website'] or '' }}" placeholder="yoursite.com">
      <small>Your author website or social link</small>
    </div>

    <button type="submit" class="btn-primary btn-full">Save Changes ✨</button>
  </form>
</div>

<script>
var input = document.getElementById('avatar_input');
var preview = document.getElementById('preview');
var fileName = document.getElementById('file-name');

input.addEventListener('change', function() {
  var file = this.files[0];
  if (file) {
    fileName.textContent = '✅ ' + file.name;
    var reader = new FileReader();
    reader.onload = function(e) {
      preview.src = e.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
});
</script>
{% endblock %}
