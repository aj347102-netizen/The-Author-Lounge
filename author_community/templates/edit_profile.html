{% extends 'base.html' %}
{% block title %} — Edit Profile{% endblock %}
{% block content %}
<div class="page-header">
  <a href="{{ url_for('profile', username=user['username']) }}" class="back-btn">← Back</a>
  <h2>Edit Profile</h2>
</div>

<div class="auth-card" style="margin-top:1rem;">
  <form method="POST" action="{{ url_for('edit_profile') }}" enctype="multipart/form-data">

    <div class="form-group">
      <label>Display Name</label>
      <input type="text" name="display_name" value="{{ user['display_name'] }}" required>
    </div>

    <div class="form-group">
      <label>Bio</label>
      <textarea name="bio" rows="4">{{ user['bio'] or '' }}</textarea>
    </div>

    <div class="form-group">
      <label>Genre</label>
      <select name="genre">
        <option value="">Select genre</option>
        {% for g in ['Fiction','Non-Fiction','Romance','Mystery & Thriller','Fantasy & Sci-Fi','Historical Fiction','Self-Help','Young Adult',"Children's",'Poetry','Biography','Horror','Other'] %}
        <option {% if user['genre'] == g %}selected{% endif %}>{{ g }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Profile Photo 📸</label>
      {% if user['avatar_url'] %}
      <img src="{{ user['avatar_url'] }}" style="width:70px;height:70px;border-radius:50%;object-fit:cover;border:3px solid #C9A84C;display:block;margin-bottom:10px;">
      {% endif %}
      <input type="file" name="avatar_file" accept="image/*"
             style="background:#2A1545;color:#E8E0D0;padding:10px;border-radius:10px;border:1.5px solid #4A2870;width:100%;">
      <small>Choose a photo from your library or take one 📱</small>
    </div>

    <div class="form-group">
      <label>Website 🌐</label>
      <input type="text" name="website" value="{{ user['website'] or '' }}" placeholder="yoursite.com">
      <small>Your author website or social link</small>
    </div>

    <button type="submit" class="btn-primary btn-full">Save Changes ✨</button>
  </form>
</div>
{% endblock %}
