{% extends 'base.html' %}
{% block title %} — Edit Profile{% endblock %}
{% block content %}
<div class="page-header">
  <a href="{{ url_for('profile', username=user['username']) }}" class="back-btn">← Back</a>
  <h2>Edit Profile</h2>
</div>

<div class="auth-card" style="margin-top:1rem;">
  <form method="POST" action="{{ url_for('edit_profile') }}">
    <div class="form-group">
      <label>Display Name</label>
      <input type="text" name="display_name" value="{{ user['display_name'] }}" required>
    </div>
    <div class="form-group">
      <label>Bio</label>
      <textarea name="bio" rows="4">{{ user['bio'] }}</textarea>
    </div>
    <div class="form-group">
      <label>Genre</label>
      <select name="genre">
        <option value="">Select genre</option>
        {% for g in ['Fiction','Non-Fiction','Romance','Mystery & Thriller','Fantasy & Sci-Fi','Historical Fiction','Self-Help','Young Adult',"Children's",'Poetry','Biography','Horror','Other'] %}
        <option {% if user['genre'] == g %}selected{% endif %}>{{ g }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Profile Photo URL</label>
      <input type="url" name="avatar_url" value="{{ user['avatar_url'] }}" placeholder="https://...">
      <small>Paste a link to your profile photo</small>
    </div>
    <div class="form-group">
      <label>Website</label>
      <input type="url" name="website" value="{{ user['website'] }}" placeholder="https://yoursite.com">
    </div>
    <button type="submit" class="btn-primary btn-full">Save Changes</button>
  </form>
</div>
{% endblock %}
