<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>The Author Lounge{% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  {% if user %}
  <header class="top-bar">
    <a href="{{ url_for('feed') }}" class="logo">🖊️ The Author Lounge</a>
    <a href="{{ url_for('create_post') }}" class="btn-post">+ Post</a>
  </header>
  {% endif %}

  <main class="main-content {% if not user %}no-nav{% endif %}">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash flash-{{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  {% if user %}
  <nav class="bottom-nav">
    <a href="{{ url_for('feed') }}" class="nav-item {% if request.endpoint == 'feed' %}active{% endif %}">
      <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
    </a>
    <a href="{{ url_for('explore') }}" class="nav-item {% if request.endpoint == 'explore' %}active{% endif %}">
      <span class="nav-icon">🔍</span><span class="nav-label">Explore</span>
    </a>
    <a href="{{ url_for('create_post') }}" class="nav-item nav-create">
      <span class="nav-icon">✍️</span><span class="nav-label">Write</span>
    </a>
    <a href="{{ url_for('profile', username=user['username']) }}" class="nav-item {% if request.endpoint == 'profile' %}active{% endif %}">
      <span class="nav-icon">👤</span><span class="nav-label">Profile</span>
    </a>
    <a href="{{ url_for('logout') }}" class="nav-item">
      <span class="nav-icon">🚪</span><span class="nav-label">Out</span>
    </a>
  </nav>
  {% endif %}

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</bo
