{% extends 'base.html' %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🖊️</div>
    <h1 class="auth-title">Ink & Pages</h1>
    <p class="auth-subtitle">A community for authors</p>
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="your_username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary btn-full">Sign In</button>
    </form>
    <p class="auth-switch">New author? <a href="{{ url_for('register') }}">Join the community</a></p>
  </div>
</div>
{% endblock %}
