{% extends 'base.html' %}
{% block content %}
<style>
.auth-page { background: #1A0D2E; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 0; }
.lounge-illustration { width: 100%; max-width: 520px; }
.login-form-wrap {
  width: 100%; max-width: 520px;
  background: #2A1545; border: 1px solid #4A2870;
  border-top: none; padding: 24px 20px 0;
  opacity: 0; transform: translateY(20px);
  animation: slideUp 0.6s ease forwards;
  animation-delay: 4.2s;
}
.login-form-wrap .auth-switch {
  background: #2A1545; border: 1px solid #4A2870;
  border-top: none; padding: 14px 20px;
  border-radius: 0 0 16px 16px;
  text-align: center; color: #9A7ABB; font-size: .9rem;
}
@keyframes slideUp {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes popIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes drawLeft {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes drawRight {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes drawUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes typewriter {
  from { opacity: 0; letter-spacing: 8px; }
  to { opacity: 1; letter-spacing: normal; }
}
@keyframes flicker {
  0%,100% { opacity: 0.9; } 50% { opacity: 0.6; }
}
.g-bg     { animation: fadeIn 0.5s ease forwards; animation-delay: 0.1s; opacity: 0; }
.g-shelf-l { animation: drawLeft 0.5s ease forwards; animation-delay: 0.4s; opacity: 0; }
.g-shelf-r { animation: drawRight 0.5s ease forwards; animation-delay: 0.6s; opacity: 0; }
.g-books-l1 { animation: drawLeft 0.4s ease forwards; animation-delay: 0.8s; opacity: 0; }
.g-books-l2 { animation: drawLeft 0.4s ease forwards; animation-delay: 1.0s; opacity: 0; }
.g-books-r1 { animation: drawRight 0.4s ease forwards; animation-delay: 0.9s; opacity: 0; }
.g-books-r2 { animation: drawRight 0.4s ease forwards; animation-delay: 1.1s; opacity: 0; }
.g-window  { animation: fadeIn 0.5s ease forwards; animation-delay: 1.3s; opacity: 0; }
.g-moon    { animation: popIn 0.4s ease forwards; animation-delay: 1.6s; opacity: 0; }
.g-lamps   { animation: fadeIn 0.4s ease forwards; animation-delay: 1.8s; opacity: 0; }
.g-sofa    { animation: drawUp 0.5s ease forwards; animation-delay: 2.1s; opacity: 0; }
.g-person1 { animation: popIn 0.4s ease forwards; animation-delay: 2.5s; opacity: 0; }
.g-person2 { animation: popIn 0.4s ease forwards; animation-delay: 2.8s; opacity: 0; }
.g-person3 { animation: popIn 0.4s ease forwards; animation-delay: 3.0s; opacity: 0; }
.g-candle  { animation: popIn 0.3s ease forwards; animation-delay: 3.3s; opacity: 0; }
.g-title   { animation: typewriter 0.6s ease forwards; animation-delay: 3.6s; opacity: 0; }
.g-candle-flame { animation: flicker 1s infinite; }
</style>

  <div class="login-form-wrap">
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="your_username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary btn-full">Enter the Lounge</button>
    </form>
